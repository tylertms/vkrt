name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows MSVC
            os: windows-latest
            archive_name: vkrt-windows-x64
            meson_args: --buildtype=release -Db_vscrt=static_from_buildtype
          - name: Ubuntu
            os: ubuntu-22.04
            archive_name: vkrt-linux-x64
            meson_args: --buildtype=release -Dnfd_backend=portal

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Resolve Vulkan SDK Version
        if: runner.os == 'Windows'
        id: vulkan-windows
        shell: pwsh
        run: |
          $version = (Invoke-WebRequest -Uri 'https://vulkan.lunarg.com/sdk/latest/windows.txt').Content.Trim()
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Resolve Vulkan SDK Version
        if: runner.os == 'Linux'
        id: vulkan-linux
        shell: bash
        run: echo "version=$(curl -fsSL https://vulkan.lunarg.com/sdk/latest/linux.txt)" >> "$GITHUB_OUTPUT"

      - name: Cache Vulkan SDK
        if: runner.os == 'Windows'
        id: vulkan-cache-windows
        uses: actions/cache@v4
        with:
          path: VULKAN_SDK
          key: ${{ runner.os }}-vulkan-${{ steps.vulkan-windows.outputs.version }}

      - name: Cache Vulkan SDK
        if: runner.os == 'Linux'
        id: vulkan-cache-linux
        uses: actions/cache@v4
        with:
          path: VULKAN_SDK
          key: ${{ runner.os }}-vulkan-${{ steps.vulkan-linux.outputs.version }}

      - name: Install Vulkan SDK
        if: runner.os == 'Windows' && steps.vulkan-cache-windows.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $version = '${{ steps.vulkan-windows.outputs.version }}'
          $sdkDir = Join-Path $PWD 'VULKAN_SDK'
          $installer = Join-Path $PWD 'vulkan_sdk.exe'
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/$version/windows/vulkan_sdk.exe?Human=true" -OutFile $installer
          Start-Process -FilePath $installer -ArgumentList @('--root', $sdkDir, '--accept-licenses', '--default-answer', '--confirm-command', 'install', 'copy_only=1') -Wait -NoNewWindow

      - name: Install Vulkan SDK
        if: runner.os == 'Linux' && steps.vulkan-cache-linux.outputs.cache-hit != 'true'
        shell: bash
        run: |
          curl -fsSL "https://sdk.lunarg.com/sdk/download/${{ steps.vulkan-linux.outputs.version }}/linux/vulkan_sdk.tar.xz?Human=true" -o vulkan_sdk.tar.xz
          tar -xJf vulkan_sdk.tar.xz
          mkdir -p VULKAN_SDK
          cp -a "${{ steps.vulkan-linux.outputs.version }}/x86_64/." VULKAN_SDK/

      - name: Set Vulkan SDK Environment
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $sdkDir = Join-Path $PWD 'VULKAN_SDK'
          "VULKAN_SDK=$sdkDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "VK_SDK_PATH=$sdkDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          (Join-Path $sdkDir 'Bin') | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Set Vulkan SDK Environment
        if: runner.os == 'Linux'
        shell: bash
        run: |
          echo "VULKAN_SDK=$PWD/VULKAN_SDK" >> "$GITHUB_ENV"
          echo "$PWD/VULKAN_SDK/bin" >> "$GITHUB_PATH"

      - name: Install Linux Packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config libwayland-dev libxkbcommon-dev wayland-protocols libxrandr-dev libxinerama-dev libxi-dev libxcursor-dev

      - name: Install Meson and Ninja
        run: python -m pip install meson ninja

      - name: Configure
        run: meson setup build ${{ matrix.meson_args }}

      - name: Build
        run: meson compile -C build

      - name: Test
        run: |
          ./build/vkrt --help
          ./build/vkrt --version
        shell: bash

      - name: Package Windows Artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $artifactDir = Join-Path $PWD "dist/${{ matrix.archive_name }}"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null
          Copy-Item build\vkrt.exe $artifactDir

      - name: Package Linux Artifact
        if: runner.os == 'Linux'
        shell: bash
        run: |
          artifact_dir="dist/${{ matrix.archive_name }}"
          mkdir -p "${artifact_dir}"
          cp build/vkrt "${artifact_dir}/"

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.archive_name }}
          path: dist/${{ matrix.archive_name }}
